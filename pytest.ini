[pytest]
; чтобы пакет pages находился при запуске из любого окружения
pythonpath = .
addopts =
    --base-url=https://demoqa.com
    --browser=chromium
    --screenshot=only-on-failure
    --output=test-results
    --alluredir=allure-results
    --clean-alluredir
    --reruns=1
    --reruns-delay=2
markers =
    elements: тесты раздела Elements
    forms: тесты раздела Forms
    alerts_windows: тесты раздела Alerts, Frame and Windows
    widgets: тесты раздела Widgets
    interactions: тесты раздела Interactions
