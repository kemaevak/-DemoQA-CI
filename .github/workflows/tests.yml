name: UI-тесты

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Получение кода
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Установка зависимостей
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Запуск тестов
        run: pytest

      - name: Сохранение Allure-результатов
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Сохранение скриншотов упавших тестов
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: test-results
